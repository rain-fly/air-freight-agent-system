server:
  port: 8081

spring:
  application:
    name: air-freight-agent-system

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/airfreight?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: airfreight
    password: airfreight123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        globally_quoted_identifiers: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# JWT
jwt:
  secret: AirFreightAgent2026SecretKeyForJWTTokenGenerationMustBe256BitsLong!
  expiration: 86400000  # 24小时

logging:
  level:
    com.airfreight: DEBUG
    org.springframework.security: INFO

# 外部API配置
api:
  iata:
    base-url: https://api.iata.org/air-cargo/v1
    api-key: demo-key
  customs:
    base-url: https://api.customs.gov/message/v1
  swift:
    base-url: https://api.swift.com/payments/v1

# 邮件默认配置（可被数据库配置覆盖）
mail:
  default-pop3-port: 995
  default-smtp-port: 465
