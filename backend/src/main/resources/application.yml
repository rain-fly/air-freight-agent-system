server:
  port: 8080

spring:
  application:
    name: air-freight-agent-system

  datasource:
    url: jdbc:h2:mem:airfreight;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# JWT
jwt:
  secret: AirFreightAgent2026SecretKeyForJWTTokenGenerationMustBe256BitsLong!
  expiration: 86400000  # 24小时

logging:
  level:
    com.airfreight: DEBUG
    org.springframework.security: INFO

# 外部API配置
api:
  iata:
    base-url: https://api.iata.org/air-cargo/v1
    api-key: demo-key
  customs:
    base-url: https://api.customs.gov/message/v1
  swift:
    base-url: https://api.swift.com/payments/v1
